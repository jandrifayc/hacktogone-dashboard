<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hacktogone Live Pro — CRM & Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .prio-A { background: #ecfdf5; color: #059669; border: 1px solid #10b981; }
  .prio-B { background: #fffbeb; color: #d97706; border: 1px solid #f59e0b; }
  .prio-C { background: #f8fafc; color: #64748b; border: 1px solid #94a3b8; }
  .status-badge { padding: 4px 10px; border-radius: 9999px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: 1px solid; }
  .status-New { background: #eff6ff; color: #2563eb; border-color: #3b82f6; }
  .status-Contacted { background: #fff7ed; color: #ea580c; border-color: #f97316; }
  .status-Replied { background: #f0fdf4; color: #16a34a; border-color: #22c55e; }
  .status-Won { background: #ecfdf5; color: #059669; border-color: #10b981; }
  .status-Lost { background: #fef2f2; color: #dc2626; border-color: #ef4444; }
  .side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
  .side-panel.open { transform: translateX(0); }
  .tab-btn { @apply border-b-2 border-transparent px-4 py-3 text-sm font-semibold text-slate-500 transition-all hover:text-indigo-600; }
  .tab-btn.active { @apply border-indigo-600 text-indigo-600; }
  thead th { position: sticky; top: 0; background: #0f172a; z-index: 10; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  select.status-badge { appearance: none; background: transparent; padding-right: 12px; }
</style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen overflow-x-hidden">

<div class="flex flex-col min-h-screen">
  <!-- HEADER -->
  <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between sticky top-0 z-30 shadow-sm">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-100">H</div>
      <div>
        <h1 class="text-lg font-extrabold tracking-tight">Hacktogone <span class="text-indigo-600 uppercase text-xs ml-1">Live CRM</span></h1>
        <p id="syncIndicator" class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Connecté Notion
        </p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="relative hidden sm:block">
        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
        <input id="searchInput" type="search" placeholder="Rechercher..." class="pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs w-64 focus:ring-2 focus:ring-indigo-500 outline-none" />
      </div>
      <button id="exportBtn" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg transition-all text-slate-600"><i data-lucide="download" class="w-4 h-4"></i></button>
    </div>
  </header>

  <!-- KPI STRIP -->
  <div class="bg-indigo-900 px-8 py-2 flex gap-8 overflow-x-auto no-scrollbar border-b border-indigo-800">
    <div class="flex items-center gap-2 whitespace-nowrap"><span class="text-[10px] font-bold text-indigo-300 uppercase">Total:</span> <span id="kpiTotal" class="text-xs font-black text-white">—</span></div>
    <div class="flex items-center gap-2 whitespace-nowrap"><span class="text-[10px] font-bold text-indigo-300 uppercase text-emerald-400">Prio A:</span> <span id="kpiA" class="text-xs font-black text-white">—</span></div>
    <div class="flex items-center gap-2 whitespace-nowrap"><span class="text-[10px] font-bold text-indigo-300 uppercase">Score Moyen:</span> <span id="kpiScore" class="text-xs font-black text-white">—</span></div>
    <div class="flex items-center gap-2 whitespace-nowrap"><span class="text-[10px] font-bold text-indigo-300 uppercase">Conversion:</span> <span id="kpiHealth" class="text-xs font-black text-white">—%</span></div>
  </div>

  <!-- TABS NAVIGATION -->
  <div class="bg-white border-b border-slate-200 px-8 flex gap-2 overflow-x-auto no-scrollbar">
    <button class="tab-btn active" data-tab="all">Tous les leads</button>
    <button class="tab-btn" data-tab="prioA">Focus Priorité A</button>
    <button class="tab-btn" data-tab="active">Prospection en cours</button>
    <button class="tab-btn" data-tab="won">Deals Gagnés</button>
  </div>

  <main class="flex-1 p-6 max-w-[1600px] mx-auto w-full">
    <!-- TABLE -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto max-h-[calc(100vh-280px)]">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-900 text-white text-[10px] font-bold uppercase tracking-widest">
              <th class="px-6 py-4 w-16">Prio</th>
              <th class="px-6 py-4">Contact & Entreprise</th>
              <th class="px-6 py-4">Coordonnées</th>
              <th class="px-6 py-4">Secteur & IA Focus</th>
              <th class="px-6 py-4 text-center">Score</th>
              <th class="px-6 py-4">Statut</th>
              <th class="px-6 py-4 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y divide-slate-100">
            <!-- Loading indicator -->
          </tbody>
        </table>
      </div>
      <div id="emptyState" class="hidden p-20 text-center flex flex-col items-center gap-4 text-slate-400">
        <i data-lucide="database-zap" class="w-12 h-12"></i>
        <p class="font-medium">Aucun résultat.</p>
      </div>
    </div>
  </main>
</div>

<!-- SIDE PANEL -->
<div id="sidePanel" class="side-panel fixed top-0 right-0 w-full sm:w-[500px] h-full bg-white shadow-2xl z-50 border-l border-slate-200 flex flex-col">
  <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50">
    <div class="flex items-center gap-3">
      <div id="panelAvatar" class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold"></div>
      <h2 id="panelName" class="text-lg font-bold">Détails</h2>
    </div>
    <button id="closePanel" class="p-2 hover:bg-slate-200 rounded-full transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
  </div>
  <div id="panelContent" class="flex-1 overflow-y-auto p-8"></div>
  <div class="p-6 border-t border-slate-100 bg-slate-50 grid grid-cols-3 gap-2">
    <button id="panelMail" class="bg-indigo-600 text-white p-3 rounded-xl text-xs font-bold hover:bg-indigo-700 flex flex-col items-center gap-1.5"><i data-lucide="mail" class="w-4 h-4"></i> Email</button>
    <button id="panelIn" class="bg-blue-600 text-white p-3 rounded-xl text-xs font-bold hover:bg-blue-700 flex flex-col items-center gap-1.5"><i data-lucide="linkedin" class="w-4 h-4"></i> LinkedIn</button>
    <button id="panelCall" class="bg-emerald-600 text-white p-3 rounded-xl text-xs font-bold hover:bg-emerald-700 flex flex-col items-center gap-1.5"><i data-lucide="phone" class="w-4 h-4"></i> Appeler</button>
  </div>
</div>
<div id="overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-40 hidden"></div>

<script>
// AUTH
const PASS = 'hack2026';
if (localStorage.getItem('auth_hack') !== 'true') {
  const input = prompt('Dashboard privé. Code requis :');
  if (input === PASS) { localStorage.setItem('auth_hack', 'true'); window.location.reload(); }
  else if (input !== null) { document.body.innerHTML = '<div class="flex h-screen items-center justify-center font-bold text-red-600 text-2xl">ACCÈS REFUSÉ.</div>'; }
}

let leads = [];
let activeTab = 'all';

async function setStatus(pageId, s){
  const indicator = document.getElementById('syncIndicator');
  indicator.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-spin"></span> Synchro Notion...';
  indicator.classList.replace('text-emerald-500', 'text-amber-600');
  
  try {
    const res = await fetch('/api/update-status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId, status: s })
    });
    if (res.ok) {
      indicator.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Synchronisé';
      indicator.classList.replace('text-amber-600', 'text-emerald-500');
      const l = leads.find(x => x.id === pageId);
      if(l) l.statut = s;
      render();
    }
  } catch (err) { console.error(err); }
}

function openLead(pageId) {
  const l = leads.find(x => x.id === pageId);
  document.getElementById('panelName').textContent = l.nom_complet;
  document.getElementById('panelAvatar').textContent = l.prenom[0] + (l.nom[0]||'');
  
  const mailSubj = encodeURIComponent(`Hacktogone x ${l.entreprise}`);
  const mailBody = encodeURIComponent(`Bonjour ${l.prenom},\n\nJ'ai vu vos récents développements sur l'IA appliquée à ${l.secteur}.\n\nHacktogone 2026 approche et nous avons qualifié un défi qui pourrait vous intéresser : ${l.pain}.\n\nOn en discute ?`);

  document.getElementById('panelContent').innerHTML = `
    <div class="mb-8">
      <div class="flex items-center gap-2 mb-4"><span class="prio-${l.priorite} status-badge">${l.priorite}</span><span class="status-badge status-${l.statut}">${l.statut}</span></div>
      <h1 class="text-3xl font-black tracking-tight text-slate-900 leading-tight">${l.entreprise}</h1>
      <p class="text-indigo-600 font-bold text-sm mt-1">${l.secteur}</p>
      ${l.website ? `<a href="${l.website}" target="_blank" class="text-[10px] text-slate-400 hover:text-indigo-600 flex items-center gap-1 mt-2 font-bold uppercase tracking-widest"><i data-lucide="external-link" class="w-3 h-3"></i> Visiter le site web</a>` : ''}
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100"><div class="text-[10px] font-bold text-slate-400 uppercase mb-2">Décideur</div><div class="font-bold text-sm text-slate-900">${l.prenom} ${l.nom}</div><div class="text-[11px] text-slate-500 font-medium">${l.titre}</div></div>
      <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100"><div class="text-[10px] font-bold text-slate-400 uppercase mb-2">Score Hacktogone</div><div class="font-black text-3xl text-indigo-600 tracking-tighter">${l.score}/10</div></div>
    </div>

    <div class="mb-8 p-6 bg-indigo-50 border border-indigo-100 rounded-3xl relative overflow-hidden">
      <i data-lucide="zap" class="w-16 h-12 text-indigo-100 absolute -right-2 -bottom-2 rotate-12"></i>
      <h3 class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-4">Opportunité IA Qualifiée</h3>
      <p class="text-indigo-950 font-semibold text-base leading-relaxed relative z-10">${l.pain || 'Aucun pain point IA documenté dans Notion.'}</p>
    </div>

    <div class="space-y-4">
      <div class="bg-slate-50 p-4 rounded-xl flex items-center justify-between border border-slate-100"><div class="flex items-center gap-3"><i data-lucide="mail" class="w-4 h-4 text-slate-400"></i><span class="text-xs font-bold">${l.email}</span></div><button onclick="navigator.clipboard.writeText('${l.email}')" class="text-slate-300 hover:text-indigo-600"><i data-lucide="copy" class="w-4 h-4"></i></button></div>
      <div class="bg-slate-50 p-4 rounded-xl flex items-center justify-between border border-slate-100"><div class="flex items-center gap-3"><i data-lucide="phone" class="w-4 h-4 text-slate-400"></i><span class="text-xs font-bold">${l.telephone || 'Non renseigné'}</span></div>${l.telephone ? `<i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500"></i>` : ''}</div>
      <div class="bg-slate-50 p-4 rounded-xl flex items-center justify-between border border-slate-100"><div class="flex items-center gap-3"><i data-lucide="map-pin" class="w-4 h-4 text-slate-400"></i><span class="text-xs font-bold">${l.ville}, ${l.region}</span></div></div>
    </div>
  `;
  
  document.getElementById('panelMail').onclick = () => window.location.href = `mailto:${l.email}?subject=${mailSubj}&body=${mailBody}`;
  document.getElementById('panelIn').onclick = () => window.open(l.linkedin || `https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(l.prenom+' '+l.nom+' '+l.entreprise)}`, '_blank');
  document.getElementById('panelCall').onclick = () => l.telephone ? window.location.href = `tel:${l.telephone.replace(/\s/g,'')}` : alert('Aucun numéro.');
  
  document.getElementById('sidePanel').classList.add('open');
  document.getElementById('overlay').classList.remove('hidden');
  lucide.createIcons();
}

function render(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  
  const filtered = leads.filter(l => {
    if(q && !(l.nom_complet+' '+l.entreprise+' '+l.secteur).toLowerCase().includes(q)) return false;
    if(activeTab === 'prioA' && l.priorite !== 'A') return false;
    if(activeTab === 'active' && !['Contacted','Replied'].includes(l.statut)) return false;
    if(activeTab === 'won' && l.statut !== 'Won') return false;
    return true;
  });

  // KPI UPDATES
  document.getElementById('kpiTotal').textContent = filtered.length;
  document.getElementById('kpiA').textContent = filtered.filter(l=>l.priorite==='A').length;
  const scores = filtered.map(l=>l.score).filter(Boolean);
  document.getElementById('kpiScore').textContent = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';
  const reached = filtered.filter(l => ['Contacted','Replied','Won'].includes(l.statut)).length;
  document.getElementById('kpiHealth').textContent = filtered.length ? Math.round((reached / filtered.length) * 100) : '0';

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);

  filtered.sort((a,b) => {
    const p = ['A','B','C'].indexOf(a.priorite) - ['A','B','C'].indexOf(b.priorite);
    return p !== 0 ? p : (b.score - a.score);
  }).forEach(l => {
    const tr = document.createElement('tr');
    tr.className = 'hover:bg-indigo-50/30 cursor-pointer transition-all border-b border-slate-50 group';
    tr.innerHTML = `
      <td class="px-6 py-5 text-center"><span class="prio-${l.priorite} status-badge">${l.priorite}</span></td>
      <td class="px-6 py-5">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-[10px] font-black text-slate-500 group-hover:bg-indigo-600 group-hover:text-white transition-all">${l.prenom[0]}${l.nom[0]||''}</div>
          <div>
            <div class="font-bold text-slate-900 text-sm leading-none mb-1.5">${l.nom_complet}</div>
            <div class="text-[11px] font-black text-slate-800 uppercase tracking-tighter">${l.entreprise}</div>
          </div>
        </div>
      </td>
      <td class="px-6 py-5">
        <div class="flex flex-col gap-1">
          <div class="flex items-center gap-2 text-xs font-medium text-slate-500"><i data-lucide="mail" class="w-3 h-3"></i> ${l.email}</div>
          ${l.telephone ? `<div class="flex items-center gap-2 text-[10px] font-bold text-slate-400"><i data-lucide="phone" class="w-3 h-3"></i> ${l.telephone}</div>` : ''}
        </div>
      </td>
      <td class="px-6 py-5">
        <div class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest mb-1">${l.secteur}</div>
        <div class="text-[11px] text-slate-500 line-clamp-1 italic">${l.pain || '—'}</div>
      </td>
      <td class="px-6 py-5 text-center font-black text-indigo-600 text-sm tracking-tighter">${l.score || '—'}</td>
      <td class="px-6 py-5">
        <select data-id="${l.id}" class="status-badge status-${l.statut} outline-none cursor-pointer hover:scale-105 transition-transform">
          ${['New','Contacted','Replied','Won','Lost'].map(v => `<option value="${v}" ${l.statut===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </td>
      <td class="px-6 py-5 text-right">
        <div class="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
          ${l.linkedin ? `<a href="${l.linkedin}" target="_blank" class="p-1.5 bg-blue-50 text-blue-600 rounded-md hover:bg-blue-600 hover:text-white transition-all"><i data-lucide="linkedin" class="w-3.5 h-3.5"></i></a>` : ''}
          <a href="mailto:${l.email}" class="p-1.5 bg-indigo-50 text-indigo-600 rounded-md hover:bg-indigo-600 hover:text-white transition-all"><i data-lucide="mail" class="w-3.5 h-3.5"></i></a>
          <button class="p-1.5 bg-slate-50 text-slate-400 rounded-md hover:bg-slate-900 hover:text-white transition-all"><i data-lucide="more-horizontal" class="w-3.5 h-3.5"></i></button>
        </div>
      </td>
    `;
    tr.onclick = (e) => { if(e.target.tagName !== 'SELECT' && !e.target.closest('a')) openLead(l.id); };
    tbody.appendChild(tr);
  });
  lucide.createIcons();
}

async function loadLeads() {
  const empty = document.getElementById('emptyState');
  empty.classList.remove('hidden');
  empty.innerHTML = '<div class="flex flex-col items-center gap-4 text-indigo-600"><span class="w-8 h-8 rounded-full border-2 border-t-transparent border-indigo-600 animate-spin"></span><p class="text-[10px] font-black uppercase tracking-[0.2em] animate-pulse">Chargement Flux Notion...</p></div>';
  try {
    const res = await fetch('/api/get-leads');
    const data = await res.json();
    if (data.error) {
      empty.innerHTML = `<div class="bg-red-50 p-6 rounded-2xl border border-red-100 text-center"><p class="text-red-600 font-bold mb-2">Erreur Notion : ${data.error}</p><p class="text-[10px] text-red-400 font-mono uppercase">${data.details || ''}</p></div>`;
      return;
    }
    leads = data;
    render();
  } catch (err) { 
    empty.innerHTML = `<div class="text-red-500 font-bold">Erreur Réseau : ${err.message}</div>`; 
  }
}

// EVENTS
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    render();
  };
});

document.getElementById('searchInput').oninput = render;
document.getElementById('closePanel').onclick = () => { document.getElementById('sidePanel').classList.remove('open'); document.getElementById('overlay').classList.add('hidden'); };
document.getElementById('overlay').onclick = () => { document.getElementById('sidePanel').classList.remove('open'); document.getElementById('overlay').classList.add('hidden'); };
document.querySelectorAll('select.status-badge').forEach(sel => { sel.onchange = (e) => setStatus(e.target.dataset.id, e.target.value); });

loadLeads();
</script>
</body>
</html>
